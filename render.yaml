services:
  - type: web
    name: bookmark-manager
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bookmark-db
          property: connectionString
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: CRON_SECRET
        generateValue: true

  - type: cron
    name: bookmark-nightly-email
    runtime: node
    plan: starter
    schedule: "0 5 * * *"  # midnight EST = 5:00 UTC
    buildCommand: echo "no build needed"
    startCommand: |
      curl -s -X POST https://bookmark-manager-6e02.onrender.com/api/cron/nightly-email \
        -H "Authorization: Bearer $CRON_SECRET" \
        -H "Content-Type: application/json"
    envVars:
      - key: CRON_SECRET
        sync: false

databases:
  - name: bookmark-db
    databaseName: bookmarks
    plan: free
